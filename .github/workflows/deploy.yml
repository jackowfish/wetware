name: Deploy

# Build the image and push to GHCR with a sortable `<timestamp>-<sha>` tag
# plus `latest`. Flux ImageUpdateAutomation in the server-utilities repo picks
# up the new tag and commits the bump to k8s/apps/wetware/app.yaml.
#
# Inlined (rather than calling the shared build-image.yml reusable workflow)
# because a public repo can't resolve that private reusable workflow.

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Compute tag
        id: tag
        run: |
          ts=$(date -u +%Y%m%d%H%M%S)
          sha=$(git rev-parse --short=7 HEAD)
          echo "value=${ts}-${sha}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/jackowfish/wetware:${{ steps.tag.outputs.value }}
            ghcr.io/jackowfish/wetware:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
